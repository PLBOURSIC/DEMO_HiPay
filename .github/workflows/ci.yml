name: Tests CucumberJS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  cucumber-tests:
    runs-on: ubuntu-latest  # Runner GitHub avec Node.js dispo nativement

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Lancer les tests CucumberJS
        run: npm test
        # ou : npx cucumber-js
</parameter>
</invoke>
name: Tests CucumberJS - API Paiement HiPay

on:
  # Déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      env:
        description: 'Environnement cible'
        required: false
        default: 'Recette1'
        type: choice
        options:
          - 'Recette1'
          - 'Recette2'
      feature:
        description: 'Feature à jouer (laisser vide = toutes)'
        required: false
        default: ''

  # Planification quotidienne à 9h00 (UTC+2 Paris = 07:00 UTC)
  schedule:
    - cron: '0 7 * * *'

  # Sur push / PR (optionnel, peut être retiré pour ne garder que le schedule)
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  cucumber-tests:
    runs-on: ubuntu-latest

    # Environnement cible (Recette1 par défaut si déclenchement automatique)
    env:
      TARGET_ENV: ${{ github.event.inputs.env || 'Recette1' }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Lancer les tests CucumberJS
        # Utilise run-tests.js dans tous les cas : il génère toujours le rapport,
        # même si des tests échouent (exit code non-zéro), puis propage le code de sortie.
        run: |
          FEATURE="${{ github.event.inputs.feature }}"
          if [ -n "$FEATURE" ]; then
            node features/support-scripts/run-tests.js "features/$FEATURE"
          else
            npm test
          fi
        env:
          API_username: ${{ env.TARGET_ENV == 'Recette2' && secrets.API_USERNAME_R2 || secrets.API_USERNAME }}
          API_password: ${{ env.TARGET_ENV == 'Recette2' && secrets.API_PASSWORD_R2 || secrets.API_PASSWORD }}
          LOGIN_BDD: ${{ env.TARGET_ENV == 'Recette2' && secrets.LOGIN_BDD_R2 || secrets.LOGIN_BDD }}
          PWS_BDD: ${{ env.TARGET_ENV == 'Recette2' && secrets.PWS_BDD_R2 || secrets.PWS_BDD }}
          API_BASE_URL: ${{ env.TARGET_ENV == 'Recette2' && secrets.API_BASE_URL_R2 || secrets.API_BASE_URL }}
          CI: true

      - name: Upload résultats bruts (JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-json-${{ github.run_number }}
          path: reports/cucumber.json
          retention-days: 7

      - name: Upload rapport HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report-${{ github.run_number }}
          path: reports/cucumber-report.html
          retention-days: 30

  publish-report:
    runs-on: ubuntu-latest
    needs: cucumber-tests
    # Toujours exécuté (même si les tests échouent), sauf si le job principal a été ignoré
    if: always() && needs.cucumber-tests.result != 'skipped'

    steps:
      - name: Télécharger le rapport HTML
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report-${{ github.run_number }}
          path: rapport/

      - name: Publier le rapport dans le résumé du workflow
            # GITHUB_STEP_SUMMARY permet d'accéder au résumé du workflow (affiché dans l'onglet Actions > Résumé)
        run: |
          echo "## 📊 Rapport de tests CucumberJS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run :** \`#${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Le rapport HTML complet est disponible dans les **Artifacts** de ce workflow :" >> $GITHUB_STEP_SUMMARY
          echo "➡️ \`cucumber-report-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.cucumber-tests.result }}" = "success" ]; then
            echo "✅ Tous les tests ont réussi." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Des tests ont échoué — consultez le rapport pour les détails." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload rapport HTML (depuis publish-report)
        uses: actions/upload-artifact@v4
        with:
          name: rapport-final-${{ github.run_number }}
          path: rapport/cucumber-report.html
          retention-days: 30